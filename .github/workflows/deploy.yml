name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/godot_templates
          key: godot-4.6.1

      - name: Install Godot
        run: |
          if [ ! -f ~/godot/godot ]; then
            mkdir -p ~/godot
            wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip -O /tmp/godot.zip
            unzip -o /tmp/godot.zip -d ~/godot
            mv ~/godot/Godot_v4.6.1-stable_linux.x86_64 ~/godot/godot
            chmod +x ~/godot/godot
          fi
          echo "$HOME/godot" >> $GITHUB_PATH

      - name: Install Export Templates
        run: |
          if [ ! -d ~/godot_templates/4.6.1.stable ]; then
            mkdir -p ~/godot_templates/4.6.1.stable
            wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz -O /tmp/templates.tpz
            unzip -o /tmp/templates.tpz -d ~/godot_templates/4.6.1.stable
            mv ~/godot_templates/4.6.1.stable/templates/* ~/godot_templates/4.6.1.stable/
          fi
          mkdir -p ~/.local/share/godot/export_templates
          ln -sf ~/godot_templates/4.6.1.stable ~/.local/share/godot/export_templates/4.6.1.stable

      - name: Import Project
        run: |
          godot --headless --import 2>&1 || true
          godot --headless --editor --quit 2>&1 || true

      - name: Run Tests
        run: |
          godot --headless --script addons/gut/gut_cmdln.gd -gdir=res://tests/ -gexit 2>&1 | tee test_output.txt
          grep -q "All tests passed" test_output.txt || exit 1

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ARTIFACT="web/darkpath-${TIMESTAMP}.zip"
          cd build/web && zip -r /tmp/darkpath-web.zip .
          aws s3 cp /tmp/darkpath-web.zip "s3://ggame-artifacts/${ARTIFACT}"
          echo "Uploaded s3://ggame-artifacts/${ARTIFACT}"

      - name: Smoke Test
        run: |
          echo "Waiting 90s for EC2 cron to deploy..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 10 https://ggame.nphunter.net/)
          echo "HTTPS status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED: expected 200, got $STATUS"
            exit 1
          fi
          # Verify content type is HTML
          CONTENT_TYPE=$(curl -s -I https://ggame.nphunter.net/ | grep -i content-type | head -1)
          echo "$CONTENT_TYPE"
          echo "Smoke test PASSED"
